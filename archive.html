<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOUBOP — Archive</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    /* NAV */

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand img {
      width: 40px;
    }

    .nav {
      display: flex;
      gap: 18px;
      font-size: 0.9rem;
      text-transform: uppercase;
      font-weight: 700;
    }

    .nav a {
      text-decoration: none;
      color: white;
      opacity: 0.7;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
    }

    /* GRID */

    .grid {
  max-width: 800px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 220px));
  justify-content: center;
  gap: 30px;
}

.collection-card {
  position: relative;
  width: 220px;
  height: 220px;
}

    .collection-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .collection-card:hover img {
      transform: scale(1.05);
    }

    /* DARK OVERLAY */

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.2);
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .collection-card:hover .overlay {
      background: rgba(0,0,0,0.6);
    }

    /* TEXT */

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
    }

  </style>
</head>

<body>

  <main class="page">

    <div class="topbar">
      <a href="index.html" class="brand">
        <img src="logo.png" alt="BOUBOP logo">
        <span>BOUBOP</span>
      </a>

      <div class="nav">
        <a href="index.html">Home</a>
        <a href="ss25.html">SS25</a>
        <a href="archive.html" class="active">Archive</a>
        <a href="https://boubop.bigcartel.com/products" target="_blank">Shop</a>
      </div>
    </div>

    <section class="grid">

      <!-- SS25 COLLECTION CARD -->
      <a href="ss25.html" class="collection-card">
        <img src="promo2.JPG" alt="SS25 Collection">

        <div class="overlay">
          <div class="title">SS25</div>
        </div>
      </a>

    </section>

  </main>

</body>
</html>
