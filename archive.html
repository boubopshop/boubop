<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOUBOP — Archive</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .archive-page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 26px 20px 40px;
      color: white;
    }

    .archive-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 34px;
    }

    .archive-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .archive-brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .archive-nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .archive-nav a {
      text-decoration: none;
      color: rgba(255,255,255,0.82);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .archive-nav a.active,
    .archive-nav a:hover {
      color: white;
    }

    .archive-intro {
      max-width: 760px;
      margin-bottom: 30px;
    }

    .archive-eyebrow {
      display: block;
      margin-bottom: 12px;
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.62);
    }

    .archive-intro h1 {
      margin: 0 0 14px;
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      text-transform: uppercase;
    }

    .archive-intro p {
      margin: 0;
      color: rgba(255,255,255,0.78);
    }

    /* GRID FIX */
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 720px;
      margin-top: 20px;
    }

    /* CARD FIX */
    .archive-card {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 24px;
      overflow: hidden;
      text-decoration: none;
      color: white;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      box-shadow:
        inset 0 1px 8px rgba(255,255,255,0.12),
        0 20px 40px rgba(0,0,0,0.22);

      transition: transform 0.3s ease;
    }

    .archive-card:hover {
      transform: translateY(-4px);
    }

    .archive-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .archive-card:hover img {
      transform: scale(1.05);
      filter: brightness(0.75);
    }

    .archive-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: end;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }

    .archive-title {
      font-size: 1.6rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* MOBILE */
    @media (max-width: 720px) {
      .archive-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="subpage">
  <div class="bg-layer"></div>

  <main class="archive-page">

    <header class="archive-topbar">
      <a href="index.html" class="archive-brand">
        <img src="logo.png">
        <span>BOUBOP</span>
      </a>

      <nav class="archive-nav">
        <a href="index.html">Home</a>
        <a href="ss25.html">SS26</a>
        <a href="archive.html" class="active">Archive</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="archive-intro">
      <span class="archive-eyebrow">BOUBOP / Collections</span>
      <h1>Archive</h1>
      <p>A growing index of collections.</p>
    </section>

    <section class="archive-grid">

      <a href="ss25.html" class="archive-card">
        <img src="promo2.JPG">
        <div class="archive-overlay">
          <div class="archive-title">SS26</div>
        </div>
      </a>

      <a href="coppenhagen.html" class="archive-card">
        <img src="1wit.png">
        <div class="archive-overlay">
          <div class="archive-title">Coppenhagen</div>
        </div>
      </a>

    </section>

  </main>
</body>
</html>
