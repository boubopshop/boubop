<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOUBOP — Contact</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    /* NAV */

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand img {
      width: 40px;
    }

    .nav {
      display: flex;
      gap: 18px;
      font-size: 0.9rem;
      text-transform: uppercase;
      font-weight: 700;
    }

    .nav a {
      text-decoration: none;
      color: white;
      opacity: 0.7;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
    }

    /* CONTENT */

    .content {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .content h1 {
      font-size: 2.8rem;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .links a {
      font-size: 1.4rem;
      font-weight: 700;
      text-decoration: none;
      color: white;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .links a:hover {
      opacity: 0.6;
      transform: translateY(-2px);
    }

    .subtext {
      margin-top: 40px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
    }

  </style>
</head>

<body>

  <main class="page">

    <div class="topbar">
      <a href="index.html" class="brand">
        <img src="logo.png" alt="BOUBOP logo">
        <span>BOUBOP</span>
      </a>

      <div class="nav">
        <a href="index.html">Home</a>
        <a href="ss25.html">SS25</a>
        <a href="archive.html">Archive</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
    </div>

    <section class="content">

      <h1>Contact</h1>

      <div class="links">
        <!-- EMAIL -->
        <a href="mailto:hello@boubop.com">
          hello@boubop.com
        </a>

        <!-- INSTAGRAM -->
        <a href="https://instagram.com/boubop_shop" target="_blank">
          Instagram
        </a>

        <!-- ADD MORE IF YOU WANT -->
        <!--
        <a href="#">TikTok</a>
        <a href="#">Press</a>
        -->
      </div>

      <div class="subtext">
        For inquiries, collaborations, or questions.
      </div>

    </section>

  </main>

</body>
</html>
