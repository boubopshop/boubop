<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOUBOP</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
      color: #ff2a2a;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 20px 30px;
    }

    .logo {
      margin-top: 0;
      margin-bottom: 12px;
      text-align: center;
    }

    .logo img {
      max-width: 240px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .logo-text {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin: 0;
      line-height: 1;
    }

    .video-frame {
      width: min(900px, 78vw);
      aspect-ratio: 16 / 9;
      border: 5px solid #ff2a2a;
      background: #e9e9e9;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .nav-buttons {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px 34px;
    }

    .nav-buttons a {
      text-decoration: none;
      color: #ff2a2a;
      font-size: clamp(1.2rem, 2vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav-buttons a:hover {
      opacity: 0.65;
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .page {
        padding: 12px 16px 24px;
      }

      .video-frame {
        width: 100%;
        aspect-ratio: 4 / 5;
      }

      .nav-buttons {
        gap: 14px 20px;
      }

      .nav-buttons a {
        font-size: 1.3rem;
      }

      .logo-text {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="logo">
      <!-- Option 1: use image logo -->
      <img src="logo.png" alt="BOUBOP logo" />

      <!-- Option 2: if you want plain text instead, delete the img above and use this:
      <h1 class="logo-text">BOUBOP</h1>
      -->
    </div>

    <section class="video-frame">
      <video autoplay muted loop playsinline>
        <source src="mainvideo.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </section>

    <nav class="nav-buttons">
      <a href="ss25.html">SS25 Collection</a>
      <a href="https://boubop.bigcartel.com/products" target="_blank">Shop</a>
      <a href="archive.html">Archive</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </main>
</body>
</html>
