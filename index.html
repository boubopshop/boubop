<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOUBOP</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px 40px;
    }

    .logo {
      margin-bottom: 16px;
      text-align: center;
    }

    .logo img {
      max-width: 240px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .video-frame {
      width: min(900px, 78vw);
      aspect-ratio: 16 / 9;
      background: black;
      overflow: hidden;
    }

    .video-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .nav-buttons {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px 36px;
    }

    .nav-buttons a {
      text-decoration: none;
      color: white;
      font-size: clamp(1.3rem, 2vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav-buttons a:hover {
      opacity: 0.6;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .video-frame {
        width: 100%;
        aspect-ratio: 4 / 5;
      }

      .nav-buttons {
        gap: 16px 20px;
      }

      .nav-buttons a {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="logo">
      <img src="logo.png" alt="BOUBOP logo" />
    </div>

    <section class="video-frame">
      <video autoplay muted loop playsinline>
        <source src="mainvideo.mp4" type="video/mp4" />
      </video>
    </section>

    <nav class="nav-buttons">
      <a href="ss25.html">SS25 Collection</a>
      <a href="https://boubop.bigcartel.com/products" target="_blank">Shop</a>
      <a href="archive.html">Archive</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

  </main>
</body>
</html>
