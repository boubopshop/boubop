<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOUBOP</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #fff7fb, #ffffff);
  color: #333;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

header img {
  height: 40px;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: black;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero img {
  max-width: 200px;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 40px;
  margin: 10px 0;
}

.hero a {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  border: 1px solid black;
  text-decoration: none;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.grid img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="https://boubop.bigcartel.com/products" target="_blank">Shop</a>
  </nav>
</header>

<div class="hero">
  <img src="logo.png">
  <h1>BOUBOP</h1>
  <p>Glossy little worlds you can wear</p>

  <a href="https://boubop.bigcartel.com/products" target="_blank">
    ENTER SHOP
  </a>
</div>

<div class="section">
  <h2>Campaign</h2>

  <div class="grid">
    <img src="promo1.JPG">
    <img src="promo2.JPG">
    <img src="promo3.JPG">
    <img src="promo4.JPG">
  </div>
</div>

</body>
</html>
