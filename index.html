<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUBOP</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fdfdfd;
            color: #111;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #eee;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 3px;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #111;
            font-size: 14px;
        }

        nav a:hover {
            opacity: 0.6;
        }

        .hero {
            height: 80vh;
            background-image: url('https://picsum.photos/1200/800');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-text {
            background: rgba(255,255,255,0.7);
            padding: 20px 40px;
            font-size: 32px;
            letter-spacing: 5px;
        }

        .section {
            padding: 60px 40px;
            text-align: center;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            border: 1px solid black;
            text-decoration: none;
            color: black;
        }

        .button:hover {
            background: black;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>BOUBOP</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <div class="hero-text">BOUBOP</div>
</div>

<div class="section">
    <h2>Welcome to BOUBOP</h2>
    <p>Handmade jewelry. Playful, expressive, evolving.</p>
    
    <!-- Replace link with your Big Cartel shop -->
    <a href="#" class="button">ENTER SHOP</a>
</div>

</body>
</html>
