<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOUBOP — SS26</title>
  <link rel="stylesheet" href="style.css"/>

  <style>
    .ss-page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 30px 20px 40px;
      color: white;
      text-align: center;
    }

    .ss-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .ss-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    .ss-brand img {
      width: 40px;
    }

    .ss-nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ss-nav a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .ss-nav a:hover {
      color: white;
    }

    .ss-title {
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: clamp(2.5rem, 6vw, 5rem);
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .ss-subtitle {
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
    }

    .ss-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .ss-grid img {
      width: 100%;
      border-radius: 20px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      padding: 10px;
    }

    @media (max-width: 800px) {
      .ss-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .ss-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="subpage">
  <div class="bg-layer"></div>
  <div class="background-overlay"></div>

  <main class="ss-page">

    <!-- NAV -->
    <header class="ss-topbar">
      <a href="index.html" class="ss-brand">
        <img src="logo.png">
        BOUBOP
      </a>

      <nav class="ss-nav">
        <a href="index.html">Home</a>
        <a href="ss26.html">SS26</a>
        <a href="coppenhagen.html">Coppenhagen</a>
        <a href="archive.html">Archive</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- TITLE -->
    <h1 class="ss-title">SS26</h1>
    <p class="ss-subtitle">Coming Soon</p>

    <!-- IMAGE GRID -->
    <section class="ss-grid">
      <!-- replace with your existing images -->
      <img src="promo1.JPG">
      <img src="promo2.JPG">
      <img src="promo3.JPG">
      <img src="promo4.JPG">
    </section>

  </main>
</body>
</html>
